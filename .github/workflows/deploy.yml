name: Deploy to dockerbox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TG_BOT_TOKEN,TG_CHAT_ID
          script: |
            set -e
            cd ~/sites/bjl-studios
            git pull origin main
            # Write .env from GitHub Secrets so docker compose picks them up.
            cat > .env <<EOF
            TG_BOT_TOKEN=$TG_BOT_TOKEN
            TG_CHAT_ID=$TG_CHAT_ID
            EOF
            # --build rebuilds the bjl-studios-api image whenever api/server.js
            # or api/Dockerfile changed.
            docker compose up -d --build
            # nginx.conf is bind-mounted into the web container, so a git pull
            # updates the file on disk but the running nginx daemon still has
            # the old config in memory. Send SIGHUP to reload it in-place;
            # fall back to a full container restart if the reload fails
            # (e.g. if the config has a syntax error or the container just
            # started and isn't ready to accept signals yet).
            docker compose exec -T bjl-studios-web nginx -s reload 2>/dev/null \
              || docker compose restart bjl-studios-web
            echo "✅ bjl-studios.de deployed at $(date)"
