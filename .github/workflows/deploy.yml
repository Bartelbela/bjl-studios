name: Deploy to dockerbox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/sites/bjl-studios
            git pull origin main
            # --build rebuilds the bjl-studios-api image whenever api/server.js
            # or api/Dockerfile changed. TG_BOT_TOKEN / TG_CHAT_ID must exist
            # in ~/sites/bjl-studios/.env on the host (see .env.example).
            docker compose up -d --build
            echo "✅ bjl-studios.de deployed at $(date)"
