# Rate-limit zone for the contact API (5 req/min/IP, burst 3).
limit_req_zone $binary_remote_addr zone=contact_api:10m rate=5r/m;

# Map to add security headers only on top-level responses.
map $sent_http_content_type $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

server {
    listen 80;
    server_name bjl-studios.de www.bjl-studios.de;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # --- Security headers (TLS terminated upstream) -------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy $csp_header always;

    # --- Reverse proxy contact form to Node API -----------------------------
    # /api/contact -> http://bjl-studios-api:3000/contact
    location /api/ {
        limit_req zone=contact_api burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://bjl-studios-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Hide internal nginx version on errors.
    server_tokens off;
}
