services:
  bjl-studios-web:
    image: nginx:alpine
    container_name: bjl-studios-web
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    external: true
